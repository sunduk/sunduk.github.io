---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>
  
  <br>

  <div>
    <ul class="tags post-tags cf">
      <li>Tagged:</li>
      {% for tag in page.tags %}
      <li><a href="/search/?tags={{ tag }}">{{ tag | downcase }}</a></li>
      {% endfor %}
    </ul>
  </div>
  <br>

  {% include disqus.html disqus_identifier=page.disqus_identifier %}
  
  <style>
    body {
      background-color: #00ff00
    }
    
    .tabnav {
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 1px solid #d1d5da
    }
    .tabnav .Counter {
      margin-left: 5px
    }
    .tabnav-tabs {
      margin-bottom: -1px
    }
    .tabnav-tab {
      display: inline-block;
      padding: 8px 12px;
      font-size: 14px;
      line-height: 20px;
      color: #586069;
      text-decoration: none;
      background-color: transparent;
      border: 1px solid transparent;
      border-bottom: 0
    }
    .tabnav-tab.selected,
    .tabnav-tab[aria-selected=true] {
      color: #000000;
      background-color: #ff00ff;
      border-color: #0000ff;
      border-radius: 3px 3px 0 0
    }
    .tabnav-tab:focus,
    .tabnav-tab:hover {
      color: #24292e;
      text-decoration: none
    }
    .tabnav-extra {
      display: inline-block;
      padding-top: 10px;
      margin-left: 10px;
      font-size: 12px;
      color: #586069
    }
    .tabnav-extra>.octicon {
      margin-right: 2px
    }
    a.tabnav-extra:hover {
      color: #0366d6;
      text-decoration: none
    }
    .tabnav-btn {
      margin-left: 10px
    }
  </style>

  <script src="https://utteranc.es/client.js"
        repo="sunduk/blog-comment"
        issue-term="url"
        theme="github-light"
        crossorigin="anonymous"
        async>
  </script>
  
</article>

<!-- responsive video js -->
<script src="/js/fluidvids.js"></script>
